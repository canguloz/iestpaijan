<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Test Noticias</title>
  <link rel="stylesheet" href="../css/noticias.css" />
  <style>
    body { margin: 0; background: #f0f0f0; }
    .news-feed { min-height: 200px; border: 3px solid blue; }
    .news-card { background: #fff; border: 2px solid green; padding: 10px; margin: 10px; display: flex; }
    .news-img { width: 100px; height: 60px; background: #ccc; margin-right: 10px; }
  </style>
</head>
<body>
  <main id="noticias" class="noticias">
    <div class="container">
      <h2 class="section-title">Test Noticias</h2>
      <div id="news-feed" class="news-feed">
        <div class="news-card">
          <div class="news-img" style="background:#ccc; width:100px; height:60px;"></div>
          <div class="news-content">
            <h3>Card Estática de Prueba</h3>
            <span class="news-date">01/01/2026</span>
            <p>Si ves esta tarjeta, el CSS funciona correctamente.</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
